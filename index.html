<script>
  function pad(n) { return String(n).padStart(2, "0"); } function updateTime() { const now = new Date(); const y = now.getFullYear(); const m = pad(now.getMonth() + 1); const d = pad(now.getDate()); const h = pad(now.getHours()); const min = pad(now.getMinutes()); const s = pad(now.getSeconds()); document.getElementById("now").textContent = `<現在時刻> ${y}/${m}/${d} 【 ${h}:${min}:${s} 】`; }

  updateTime();          // 初回表示
  setInterval(updateTime, 100);  // 1秒ごとに更新
</script>
